<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consultar Sistema</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --secondary: #475569;
      --error: #ef4444;
      --success: #10b981;
      --bg: #f8fafc;
      --text: #1e293b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 280px;
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 { font-size: 16px; margin: 0 0 15px 0; text-align: center; }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: var(--secondary); }
    .btn-outline:hover { background: #e2e8f0; }
    
    #status-container, #test-container {
      margin-top: 10px;
      text-align: center;
      width: 100%;
    }
    .hidden { display: none !important; }
    
    /* Loading Spinner */
    .spinner {
      border: 3px solid rgba(0,0,0,0.1);
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 1s linear infinite;
      margin: 0 auto 10px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .message { font-size: 13px; margin-top: 5px; font-weight: 500; }
    .error-msg { color: var(--error); }
    .success-msg { color: var(--success); }
    
    .validation-box {
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      padding: 8px;
      margin-top: 10px;
      font-size: 12px;
      text-align: left;
      color: #0369a1;
    }
    .validation-box strong { display: block; margin-bottom: 3px; }
    
    hr { width: 100%; border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0; }
  </style>
</head>
<body>
  <h2>Consulta Integrada</h2>
  
  <button id="btn-search" class="btn btn-primary">Validar Atendimento</button>
  
  <div id="status-container" class="hidden">
    <div id="loading-state" class="hidden">
      <div class="spinner"></div>
      <div class="message">Validando no banco...</div>
    </div>
    
    <div id="result-state" class="hidden">
      <div id="result-message" class="message"></div>
      <div id="validation-data" class="validation-box hidden"></div>
      <button id="btn-manual" class="btn btn-outline hidden" style="margin-top:10px;">Busca Manual</button>
    </div>
  </div>

  <hr>

  <button id="btn-test-conn" class="btn btn-outline">Testar Conexão com Banco</button>
  <div id="test-container" class="hidden">
    <div id="test-message" class="message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
