<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrar atendimento</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0b1220; --card: #0f1830; --border: #1f2d4d; --text: #e6edf7;
      --muted: #8a99b8; --muted2: #5a6a8a; --primary: #2f7ff0; --primary2: #16b89a;
    }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font: 14px/1.45 -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100%;
    }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -.01em; }
    header p { margin: 2px 0 0; font-size: 12px; color: var(--muted); }
    .close {
      background: transparent; border: 0; color: var(--muted); cursor: pointer;
      font-size: 20px; line-height: 1; padding: 6px; border-radius: 8px;
    }
    .close:hover { background: rgba(255,255,255,.06); color: var(--text); }
    form { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); }
    input, select, textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      color: var(--text); border-radius: 9px; padding: 9px 11px; font: inherit; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { min-height: 74px; resize: vertical; }
    .combo { position: relative; }
    .combo-list {
      position: absolute; z-index: 5; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
      max-height: 220px; overflow-y: auto; box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }
    .combo-item { padding: 8px 11px; cursor: pointer; }
    .combo-item:hover { background: rgba(255,255,255,.05); }
    .combo-item .nm { font-size: 13px; }
    .combo-item .mt { font-size: 11px; color: var(--muted); }
    .chip {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 8px 11px;
    }
    .chip .x { background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 15px; }
    .btn-validate {
      margin-top: 6px; width: 100%; background: rgba(47,127,240,.12); color: #7fb2f7;
      border: 1px solid rgba(47,127,240,.3); border-radius: 9px; padding: 8px 11px;
      font: inherit; font-weight: 600; cursor: pointer;
    }
    .btn-validate:hover { background: rgba(47,127,240,.2); }
    .btn-validate:disabled { opacity: .6; cursor: not-allowed; }
    .validate-msg { margin-top: 5px; font-size: 12px; min-height: 15px; }
    .validate-msg.ok { color: #34d399; }
    .validate-msg.warn { color: #fbbf24; }
    .error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: #f87171; padding: 9px 11px; border-radius: 9px; font-size: 13px; }
    footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 14px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    button.btn { border-radius: 9px; padding: 9px 18px; font: inherit; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
    button.ghost { background: transparent; color: var(--muted); }
    button.ghost:hover { color: var(--text); background: rgba(255,255,255,.05); }
    button.primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; border: 0; }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Registrar atendimento</h1>
      <p>Sem sair do Crisp — salva direto no sistema.</p>
    </div>
    <button class="close" id="close" title="Fechar">&times;</button>
  </header>

  <form id="form" autocomplete="off">
    <div class="field">
      <label for="subject">Assunto *</label>
      <input id="subject" placeholder="Resumo do atendimento" />
    </div>

    <div class="row">
      <div class="field">
        <label for="name">Nome do contato</label>
        <input id="name" placeholder="Nome do cliente" />
      </div>
      <div class="field">
        <label for="phone">Telefone / WhatsApp</label>
        <input id="phone" placeholder="WhatsApp do cliente" />
      </div>
    </div>

    <div class="field">
      <label for="url">URL do atendimento</label>
      <input id="url" placeholder="https://app.crisp.chat/..." />
    </div>

    <div class="field">
      <label for="description">Descrição</label>
      <textarea id="description" placeholder="Detalhes do atendimento..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="status">Status</label>
        <select id="status">
          <option value="novo">Novo</option>
          <option value="em_andamento">Em Andamento</option>
          <option value="aguardando">Aguardando</option>
          <option value="resolvido">Resolvido</option>
          <option value="fechado">Fechado</option>
        </select>
      </div>
      <div class="field">
        <label for="sistema">Sistema</label>
        <select id="sistema">
          <option value="Z">Z — Zorte</option>
          <option value="L">L — Lonngren</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="company">Empresa</label>
      <div class="combo">
        <div id="companyChip" class="chip" style="display:none">
          <span id="companyChipName"></span>
          <button type="button" class="x" id="companyClear" title="Remover">&times;</button>
        </div>
        <input id="company" placeholder="Buscar por nome, CNPJ ou tenant..." />
        <div id="companyList" class="combo-list" style="display:none"></div>
      </div>
      <button type="button" class="btn-validate" id="validate">Validar atendimento (identificar empresa)</button>
      <div id="validateMsg" class="validate-msg"></div>
    </div>

    <div class="row">
      <div class="field">
        <label for="attendant">Atendente</label>
        <select id="attendant"><option value="">— Não atribuído —</option></select>
      </div>
      <div class="field">
        <label for="tags">Tags (vírgula)</label>
        <input id="tags" placeholder="urgente, vip" />
      </div>
    </div>

    <div id="error" class="error" style="display:none"></div>
  </form>

  <footer>
    <button type="button" class="btn ghost" id="cancel">Cancelar</button>
    <button type="submit" form="form" class="btn primary" id="submit">Criar ticket</button>
  </footer>

  <script src="drawer.js"></script>
</body>
</html>
