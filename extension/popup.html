<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 330px; margin: 0; padding: 14px; font: 13px/1.45 -apple-system, Segoe UI, Roboto, sans-serif; background: #0b1220; color: #e6edf7; }
    h1 { font-size: 14px; margin: 0 0 2px; }
    p.sub { margin: 0 0 12px; color: #8a99b8; font-size: 12px; }
    .ver { color: #5a6a8a; font-size: 11px; }
    label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #8a99b8; margin: 10px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 7px 9px; border-radius: 8px; border: 1px solid #1f2d4d; background: #0f1830; color: #e6edf7; font-size: 13px; }
    button { margin-top: 10px; padding: 7px 10px; border-radius: 8px; border: 0; background: #2f7ff0; color: #fff; font-size: 13px; cursor: pointer; }
    button.ghost { background: transparent; border: 1px solid #1f2d4d; color: #c0cce6; }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    hr { border: 0; border-top: 1px solid #1f2d4d; margin: 14px 0; }
    .status { margin-top: 10px; padding: 8px 10px; border-radius: 8px; background: #0f1830; border: 1px solid #1f2d4d; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .ok { color: #4ade80; } .warn { color: #fbbf24; } .err { color: #f87171; }
    .result { padding: 8px 10px; border-radius: 8px; background: #0f1830; border: 1px solid #1f2d4d; margin-top: 8px; }
    .result .name { font-weight: 600; }
    .result .meta { color: #8a99b8; font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>Z-Ticket · Crisp</h1>
  <p class="sub">Enriquecimento de conversas com CNPJ<br><span class="ver" id="ver"></span></p>

  <label>URL do backend Z-Ticket</label>
  <input id="backendUrl" placeholder="http://localhost:3001" />

  <label>Seletor CSS do cabeçalho (opcional)</label>
  <input id="headerSelector" placeholder="deixe vazio para detecção automática" />

  <label>Website ID do Crisp (opcional)</label>
  <input id="websiteId" placeholder="detectado pela URL, se vazio" />

  <label>Escopo — área da conversa a varrer (opcional)</label>
  <input id="scopeSelector" placeholder="vazio = detecção automática" />

  <label>Ignorar — fila de atendimento (opcional)</label>
  <input id="excludeSelector" placeholder="seletor da lista da fila a ignorar" />

  <button id="save">Salvar configurações</button>

  <div class="row">
    <button class="ghost" id="detect">Detectar agora</button>
    <button class="ghost" id="testStatus">Testar backend</button>
  </div>

  <div class="row">
    <button class="ghost" id="checkUpdate">Verificar atualização</button>
    <button id="reload" style="display:none">Recarregar (nova versão)</button>
  </div>

  <hr />

  <label>Buscar no Z-Ticket (nome, tenant ou CNPJ)</label>
  <input id="searchQ" placeholder="ex: Marcello, 36380677, Grupo X" />
  <button class="ghost" id="searchBtn">Buscar no banco</button>
  <div id="results"></div>

  <div class="status" id="status">Pronto.</div>

  <script src="popup.js"></script>
</body>
</html>
