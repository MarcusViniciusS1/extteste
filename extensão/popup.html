<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Extensão Unificada</title>
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      background-color: #f4f4f9;
    }
    h3 {
      color: #333;
      font-size: 14px;
      border-bottom: 2px solid #007bff;
      padding-bottom: 5px;
    }
    p {
      font-size: 12px;
      color: #666;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h3>Painel Unificado</h3>
  <p>Status: Ativo e integrado.</p>
  <button id="btnAction">Executar Ação</button>
  <script src="popup.js"></script>
</body>
</html>
