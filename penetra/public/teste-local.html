<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teste local — Plugin Salvar contato</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: #26343f; background: #f4f6f8; padding: 24px;
      }
      .wrap { max-width: 760px; margin: 0 auto; }
      h1 { font-size: 20px; }
      p.sub { color: #6a7885; margin-top: -6px; }
      .card { background: #fff; border: 1px solid #e3e8ec; border-radius: 10px; padding: 18px; margin-bottom: 18px; }
      label { display: block; font-weight: 600; font-size: 13px; margin: 10px 0 4px; }
      input { width: 100%; padding: 9px 11px; border: 1px solid #cfd7dd; border-radius: 7px; font-size: 14px; }
      button { margin-top: 12px; border: 0; border-radius: 7px; padding: 9px 16px; font-weight: 600; color: #fff; background: #1972f5; cursor: pointer; }
      button.sec { background: #59707f; }
      .passo { font-size: 12px; color: #98a4ad; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
      th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid #eef1f3; }
      th { color: #6a7885; font-weight: 600; }
      .pick { color: #1972f5; cursor: pointer; text-decoration: underline; }
      code { background: #eef1f3; padding: 1px 5px; border-radius: 4px; }
      .msg { font-size: 13px; margin-top: 10px; }
      .ok { color: #1a8f4c; } .erro { color: #d43f3f; } .info { color: #6a7885; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Teste local — “Salvar contato”</h1>
      <p class="sub">
        Simula o POST que o Crisp faz na sua Action URL (<code>/crisp/action</code>)
        quando o operador clica no botao. So para testar em <code>localhost</code>.
      </p>

      <div class="card">
        <div class="passo">Passo 1 — Seu website_id</div>
        <label for="wid">website_id</label>
        <input id="wid" placeholder="ex.: 8c84e...  (na URL do Crisp: app.crisp.chat/website/ESTE-PEDACO/inbox/)" />
        <button class="sec" onclick="listar()">Listar conversas recentes</button>
        <div id="lista"></div>
      </div>

      <div class="card">
        <div class="passo">Passo 2 — session_id e disparo</div>
        <label for="sid">session_id</label>
        <input id="sid" placeholder="clique numa conversa acima, ou cole aqui" />
        <button onclick="disparar()">Simular clique em “Salvar contato”</button>
        <div id="resultado" class="msg info"></div>
      </div>
    </div>

    <script>
      async function listar() {
        var wid = document.getElementById("wid").value.trim();
        var alvo = document.getElementById("lista");
        if (!wid) { alvo.innerHTML = '<p class="msg erro">Preencha o website_id.</p>'; return; }
        alvo.innerHTML = '<p class="msg">Carregando…</p>';
        try {
          var r = await fetch("/api/conversas?website_id=" + encodeURIComponent(wid));
          var d = await r.json();
          if (!d.ok) { alvo.innerHTML = '<p class="msg erro">' + (d.mensagem || "Erro") + "</p>"; return; }
          if (!d.conversas.length) { alvo.innerHTML = '<p class="msg">Nenhuma conversa encontrada.</p>'; return; }
          alvo.innerHTML = "<table><tr><th></th><th>Nome</th><th>E-mail</th><th>Telefone</th></tr>" +
            d.conversas.map(function (c) {
              return "<tr><td><span class='pick' onclick=\"escolher('" + c.session_id + "')\">selecionar</span></td>" +
                "<td>" + (c.nome || "—") + "</td><td>" + (c.email || "—") + "</td><td>" + (c.telefone || "—") + "</td></tr>";
            }).join("") + "</table>";
        } catch (e) {
          alvo.innerHTML = '<p class="msg erro">Erro de conexão. O servidor está rodando (npm start)?</p>';
        }
      }

      function escolher(sid) {
        document.getElementById("sid").value = sid;
        disparar();
      }

      async function disparar() {
        var wid = document.getElementById("wid").value.trim();
        var sid = document.getElementById("sid").value.trim();
        var box = document.getElementById("resultado");
        if (!wid || !sid) { box.className = "msg erro"; box.textContent = "Preencha website_id e session_id."; return; }
        box.className = "msg info"; box.textContent = "Enviando…";
        // Corpo no MESMO formato que o Crisp envia para a Action URL.
        var corpo = {
          action: { type: "button", method: null },
          widget: { section_id: "zorte", item_id: "salvar_contato" },
          origin: { website_id: wid, session_id: sid },
          payload: {},
          timestamp: 0
        };
        try {
          var r = await fetch("/crisp/action", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(corpo)
          });
          var d = await r.json();
          box.className = "msg " + (d.ok ? "ok" : "erro");
          box.textContent = (d.mensagem || JSON.stringify(d));
        } catch (e) {
          box.className = "msg erro"; box.textContent = "Erro de conexão.";
        }
      }
    </script>
  </body>
</html>
